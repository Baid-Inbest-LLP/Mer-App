version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: mer-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: mer_db

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mer-server
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/mer_db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}
      CLIENT_URL: http://localhost:5173
    volumes:
      - ./server/uploads:/app/uploads
    depends_on:
      - mongodb

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: mer-client
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - server

volumes:
  mongodb_data:
